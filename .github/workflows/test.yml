name: CI

on:
  push:
    branches: [ main, v2 ]
  pull_request:
    branches: [ main, v2 ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc make

    - name: Compile components
      run: |
        make

    - name: Run v1.0 Security Tests
      run: |
        make test

    - name: Run Network Allowlist Tests
      run: |
        make test-network

    - name: Run v2.0 Namespaces & Seccomp Tests
      run: |
        make test-v2
